<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Message Sent — Eileen Banting</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream:  #F7F4EF;
      --ink:    #1C1B19;
      --accent: #A84A28;
      --mid:    #6B5A4E;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: var(--cream);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      line-height: 1.7;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
    }

    .icon {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem;
    }
    .icon svg { display: block; }

    .eyebrow {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.75rem;
    }
    h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(2.2rem, 5vw, 3.5rem);
      font-weight: 400;
      line-height: 1.1;
      margin-bottom: 1rem;
    }
    p {
      font-size: 1rem;
      color: var(--mid);
      max-width: 38ch;
      margin: 0 auto 2.5rem;
    }
    .divider {
      width: 3rem; height: 1px;
      background: var(--accent);
      margin: 0 auto 1.5rem;
    }
    .back-link {
      display: inline-flex; align-items: center; gap: 0.6rem;
      font-size: 0.78rem; font-weight: 500;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--ink);
      text-decoration: none;
      border-bottom: 1px solid var(--ink);
      padding-bottom: 3px;
      transition: color 0.3s, border-color 0.3s;
    }
    .back-link:hover { color: var(--accent); border-color: var(--accent); }
    .back-link svg { transition: transform 0.3s; }
    .back-link:hover svg { transform: translateX(-4px); }

    footer {
      position: fixed; bottom: 1.5rem; left: 0; right: 0;
      text-align: center;
      font-size: 0.72rem;
      color: rgba(28,27,25,0.35);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <div class="icon">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#F7F4EF" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
  </div>

  <p class="eyebrow">Message Received</p>

  <h1>Thank you for<br/>reaching out.</h1>

  <div class="divider"></div>

  <p>I'll review your message and be in touch shortly. In the meantime, feel free to explore more of my work.</p>

  <a href="index.html" class="back-link">
    <svg width="18" height="8" viewBox="0 0 18 8" fill="none">
      <path d="M18 4H2M5 1L1 4L5 7" stroke="currentColor" stroke-width="1.2"/>
    </svg>
    Back to Portfolio
  </a>

  <footer>© 2025 Eileen Banting</footer>

</body>
</html>
